<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="container">

  <div class="left">
    <h1>FRAUD<span>SYS</span></h1>
    <p>AI-powered fraud detection system using analytics and machine learning.</p>
    <div class="live">● SYSTEM ACTIVE - MONITORING</div>
  </div>

  <div class="login-box">
    <h2>SECURE ACCESS</h2>

    <input type="text" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">LOGIN</button>

    <p class="link">
      New user? <a href="register.html">Register</a>
    </p>
  </div>

</div>

<script>
function login(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  let savedUser = JSON.parse(localStorage.getItem("user"));

  if(!email || !password){
    alert("Enter all fields ❌");
    return;
  }

  if(savedUser && email === savedUser.email && password === savedUser.password){
    localStorage.setItem("role", savedUser.role);
    window.location.href = "index.html";
  } else {
    alert("Invalid credentials ❌");
  }
}
</script>

</body>
</html>
